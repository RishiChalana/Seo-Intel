<!-- Suppressed Navigation Shells: TopAppBar and SideNav are hidden as per rules for transactional/linear screens (Brief Creation Input). -->
<!-- We will include a minimal header with just the brand logo to anchor the page, acting outside the standard navigation shell. -->
<header class="absolute top-0 left-0 w-full p-margin-mobile md:px-margin-desktop py-gutter flex justify-start items-center bg-transparent z-50">
<img alt="EMIAC Technologies" class="h-8 md:h-10 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLt8PxeLZftTYM98Unh3i40XGRThMEIHA2ea4mYatxTVVav3l-AbMwrPFKUKqpxagn4kJqaSePb2GTKHqaKlWT7g4Pjoay-5m9PoHx2QAA19-Wi2QyC-MpySbDq5mVFOyTIduuGfKX03qrWwTbryUoUL4yR_HOsIQNSMbIHzVno4Tstrs5mzgAF8xcJvawVaU2lG8hxMmgqMhSLJlb2LN83HanyC2n0E7f0LslMs6UNh3E4zcPtXKUdH6msJ"/>
</header>
<main class="w-full max-w-[600px] px-margin-mobile md:px-0 mx-auto mt-20 mb-section-gap flex flex-col items-center">
<!-- Headline -->
<div class="text-center mb-gutter w-full">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-brand-deep mb-base">Generate a competitor-grounded content brief</h1>
<p class="font-body-lg text-body-lg text-secondary">Enter your target topic to begin the AI-driven analysis.</p>
</div>
<!-- Input Module (Card) -->
<div class="w-full bg-white border border-[#E0E5E0] rounded-lg p-gutter shadow-[0_4px_24px_rgba(0,99,68,0.04)] flex flex-col gap-gutter">
<!-- Topic Field -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-2" for="topicInput">
<span class="material-symbols-outlined text-[20px]" data-icon="search">search</span>
                    Topic
                </label>
<input class="w-full bg-white border border-outline-variant rounded p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="topicInput" placeholder="email marketing automation" type="text"/>
</div>
<!-- Competitors Field -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-2" for="competitorsSelect">
<span class="material-symbols-outlined text-[20px]" data-icon="group">group</span>
                    Competitors to analyze
                </label>
<div class="relative w-full">
<select class="w-full bg-white border border-outline-variant rounded p-3 pr-10 font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="competitorsSelect">
<option value="1">1 Competitor</option>
<option selected="" value="3">3 Competitors (Recommended)</option>
<option value="5">5 Competitors</option>
<option value="10">10 Competitors</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Target Audience Field -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-2" for="audienceInput">
<span class="material-symbols-outlined text-[20px]" data-icon="target">target</span>
                    Target audience <span class="text-secondary opacity-70 ml-1 font-body-sm">(Optional)</span>
</label>
<input class="w-full bg-white border border-outline-variant rounded p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all duration-200" id="audienceInput" placeholder="e.g., Marketing Managers, B2B SaaS" type="text"/>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container hover:bg-brand-deep text-white rounded font-label-lg text-label-lg py-4 flex items-center justify-center gap-2 transition-colors duration-200 mt-2">
                Generate Brief
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>

<div class="flex flex-wrap justify-center gap-3 mt-gutter max-w-full">
<div class="bg-surface-tint/10 text-primary-container px-3 py-1.5 rounded-full font-label-sm text-label-sm flex items-center gap-1.5">
